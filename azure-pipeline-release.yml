# https://aka.ms/yaml

pool:
  name: 'Default'

variables:
  buildConfiguration: 'Release'
  nugetFeedUrl: 'https://www.nuget.org/packages/DevInstance.BlazorToolkit/'
  nugetApiKey: $(NuGetApiKey)

steps:
# Step 1: Restore NuGet Packages
- task: NuGetToolInstaller@1
  displayName: 'NuGet Tool Installer'

# - task: NuGetAuthenticate@1
#   displayName: 'NuGet Authenticate'
  
- task: UseDotNet@2
  displayName: 'Use .NET 8.x'
  inputs:
    version: 8.x
    
- task: NuGetCommand@2
  inputs:
    command: 'restore'
    restoreSolution: '**/*.sln'

# Step 2: Build the Solution and pack NuGet Package
- task: VSBuild@1
  inputs:
    solution: '**/DevInstance.BlazorToolkit.csproj'
    msbuildArgs: '/p:Configuration=$(buildConfiguration)'

# Step 3: Pack NuGet Package
# - task: NuGetCommand@2
#   inputs:
#     command: 'pack'
#     packagesToPack: '**/DevInstance.BlazorToolkit.csproj'  # Or .nuspec if applicable
#     configuration: $(buildConfiguration)

- powershell: Get-ChildItem -recurse
# Step 3: Push NuGet Package
- task: NuGetCommand@2
  inputs:
    command: 'push'
    packagesToPush: '**/*.nupkg'
    nuGetFeedType: 'external'
    externalFeedCredentials: 'NugetCon'
    feedPublishUrl: 'https://api.nuget.org/v3/index.json'
